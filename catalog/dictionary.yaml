  4. หากมีข้อสงสัย ให้ยึดหลักว่า "หากข้อความอาจทำให้ลูกค้าเข้าใจว่ากู้ได้ง่าย กู้ได้ทุกคน ได้เงินแน่นอน หรือก่อหนี้โดยไม่คำนึงถึงความสามารถในการชำระหนี้ ให้ถือว่าไม่สามารถใช้ได้ ให้หารือทีม Legal และ Compliance เป็นรายกรณีไป"
