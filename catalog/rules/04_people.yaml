# generated from 'A. Ads Checklist' > หมวด 4 บุคคลและกิจกรรมทางการตลาด — verbatim, DO NOT EDIT BY HAND
category: people
rules:
  - id: RL-4.1
    title: รีวิวลูกค้า (Customer Testimonial)
    severity: high
    check: |
      รีวิวหรือคำรับรองต้องเป็นข้อมูลจริง สามารถตรวจสอบได้ และไม่ทำให้เข้าใจว่าผลลัพธ์เดียวกันจะเกิดขึ้นกับลูกค้าทุกราย และต้องได้รับอนุญาตจากลูกค้าก่อนนำมาเผยแพร่
    must_state: |
      อาจระบุเพิ่มเติมว่าเป็นประสบการณ์เฉพาะบุคคล
  - id: RL-4.2
    title: Influencer/KOL/Presenter
    severity: high
    check: |
      ต้องกำกับดูแลเนื้อหา ต้องตรวจสอบก่อนเผยแพร่ ให้เป็นไปตามหลักเกณฑ์ RL เช่นเดียวกับสื่อที่บริษัทจัดทำเอง และต้องไม่สื่อสารเกินข้อเท็จจริง รวมถึงต้องไม่สื่อว่าผลิตภัณฑ์สินเชื่อสามารถแก้ปัญหาทางการเงินได้ทุกกรณี หรือทำให้เกิดความมั่งคั่ง (สื่อสารตามข้อเท็จจริงของผลิตภัณฑ์)
  - id: RL-4.3
    title: ของใช้พนักงาน / ของสมนาคุณที่แจกให้แก่ลูกค้าเพื่อทําการตลาด
    severity: high
    check: |
      ที่มีลักษณะเชิญชวนหรือจูงใจให้มีการใช้ผลิตภัณฑ์สินเชื่อของบริษัทซึ่งเข้าข่ายเป็นการโฆษณา ต้องมีคำเตือน RL ครบถ้วน กรณีมีสิ่งของหลายแบบ/หลายประเภท ต้องกำหนดเงื่อนไขของการได้รับให้ชัดเจน และให้ลูกค้ามีสิทธิตัดสินใจเลือกของสมนาคุณได้เอง (กรณีสามารถเลือกได้) และต้องไม่ได้รับผลตอบแทนรูปแบบใดในการใช้สินค้าหรือของสมนาคุณดังกล่าว
       
      ทั้งนี้ ห้ามแจกของเพื่อจูงใจให้มาสมัครสินเชื่อ
    must_state: |
      ต้องมีคำเตือน อัตราดอกเบี้ย อย่างครบถ้วน และปฏิบัติตามหลักเกณฑ์การจัดทำสื่อโฆษณาเช่นเดียวกัน
  - id: RL-4.4
    title: การจัดกิจกรรมส่งเสริมการขาย
    severity: medium
    check: |
      กิจกรรมทางการตลาดต้องไม่กดดัน เร่งรัดให้ลูกค้าสมัคร หรือชักจูงให้ลูกค้าก่อหนี้เกินความจำเป็น
    must_state: |
      เปิดเผยเงื่อนไขกิจกรรมอย่างชัดเจน ระบุระยะเวลา เริ่มต้น-สิ้นสุด เช่น โปรโมชั่น X วันที่ D/M/Y - D/M/Y
  - id: RL-4.5
    title: การโฆษณาสินเชื่อร่วมกับประกันภัย
    severity: high
    check: |
      ต้องไม่ทำให้ลูกค้าเข้าใจว่าการซื้อประกันเป็นเงื่อนไขในการได้รับอนุมัติสินเชื่อ
    must_state: |
      แยกข้อมูลสินเชื่อและประกันภัยให้ชัดเจน
  - id: RL-4.6
    title: การเปรียบเทียบกับคู่แข่ง
    severity: medium
    check: |
      ข้อมูลที่ใช้เปรียบเทียบต้องเป็นข้อเท็จจริง ตรวจสอบได้ และไม่ก่อให้เกิดความเข้าใจผิด
    must_state: |
      ระบุแหล่งอ้างอิงที่ตรวจสอบได้
  - id: RL-4.7
    title: การอ้างอิงรางวัลหรือสถิติ
    severity: medium
    check: |
      การอ้างอิงรางวัล อันดับ หรือสถิติต้องเป็นข้อมูลจริง และสามารถพิสูจน์ได้
    must_state: |
      ระบุแหล่งที่มาและช่วงเวลาที่อ้างอิง
  - id: RL-4.8
    title: จับรางวัลชิงโชค
    severity: high
    check: |
      ต้องมีการขออนุญาตจัดกิจกรรมการชิงโชคก่อน ต่อกรมการปกครอง 
      ทั้งนี้ สามารถสอบถามเพิ่มเติมได้ที่ทีมกฎหมาย
    must_state: |
      ต้องประกาศระยะเวลา/เงื่อนไข ต่างๆ ที่เกี่ยวข้องให้ชัดเจน ตรงตามที่ได้รับอนุญาตจากกรมการปกครอง พร้อมทั้งระบุเลขที่ใบอนุญาตในสื่อโฆษณา
