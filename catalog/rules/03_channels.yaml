# generated from 'A. Ads Checklist' > หมวด 3 ช่องทางการสื่อสารและการโฆษณา — verbatim, DO NOT EDIT BY HAND
category: channels
rules:
  - id: RL-3.1
    title: การโฆษณาผ่านเสียง
    severity: high
    check: |
      การโฆษณาผ่านวิทยุ Podcast เสียงตามสาย หรือสื่อที่รับสารด้วยเสียงเพียงอย่างเดียว ต้องสื่อสารข้อมูลอย่างชัดเจน ไม่ทำให้เข้าใจผิด และต้องได้ยินคำเตือนอย่างชัดเจน
      สามารถอ้างอิงรายละเอียดสมมติฐานและตัวอย่างการคํานวณจากแหล่งอื่นได้ เช่น เว็บไซต์ของบริษัทได้
    must_state: |
      คำเตือน "กู้เท่าที่จำเป็นและชำระคืนไหว" แจ้งอัตราดอกเบี้ยอยู่ระหว่าง XX%-XX% ต่อปี (ดอกเบี้ยต่ำสุด-สูงสุด) ตามประเภทผลิตภัณฑ์ และรวมถึงช่องทางศึกษารายละเอียดเพิ่มเติม  ต้องได้ยิน "คำเตือน + อัตราดอกเบี้ย" อย่างชัดเจน
  - id: RL-3.2
    title: วิดีโอ
    severity: high
    check: |
      ต้องแสดงข้อมูลสำคัญ เช่น คำเตือน อัตราดอกเบี้ย และเงื่อนไขสำคัญ ต้องปรากฏบนหน้าจอด้วยขนาด ระยะเวลา และตำแหน่งที่สามารถอ่านได้ 
      
      ทั้งนี้ ขนาดตัวอักษรอ้างอิงตามแนวปฏิบัติของ KBank
    must_state: |
      คำเตือน "กู้เท่าที่จำเป็นและชำระคืนไหว" แจ้งอัตราดอกเบี้ยอยู่ระหว่าง XX%-XX% ต่อปี (ดอกเบี้ยต่ำสุด-สูงสุด) ตามประเภทผลิตภัณฑ์ และเงื่อนไขสำคัญของผลิตภัณฑ์
  - id: RL-3.3
    title: Social Media
    severity: high
    check: |
      การสื่อสารผ่าน Facebook, TikTok, Instagram, X, YouTube, LINE OA หรือแพลตฟอร์มอื่น ถือเป็นสื่อโฆษณาและอยู่ภายใต้หลักเกณฑ์เดียวกับสื่อทุกประเภท
    must_state: |
      คำเตือน "กู้เท่าที่จำเป็นและชำระคืนไหว" แจ้งอัตราดอกเบี้ยอยู่ระหว่าง XX%-XX% ต่อปี (ดอกเบี้ยต่ำสุด-สูงสุด) ตามประเภทผลิตภัณฑ์ และเงื่อนไขสำคัญของผลิตภัณฑ์
  - id: RL-3.4
    title: Comment
    severity: high
    check: |
      การตอบ Comment ถือเป็นการสื่อสารทางการตลาดของบริษัท ห้ามรับประกันผลการอนุมัติ หรือให้ข้อมูลที่อาจทำให้เข้าใจผิด
    must_state: |
      ใช้ข้อความมาตรฐานที่ได้รับอนุมัติจากบริษัท
  - id: RL-3.5
    title: Inbox / Direct Message
    severity: high
    check: |
      การตอบลูกค้าผ่าน Inbox, Messenger, LINE Chat หรือช่องทางสนทนาอื่น ต้องเป็นไปตามหลักเกณฑ์ RL และ Market Conduct ห้ามสื่อว่าผ่านแน่นอน หรือรับเงินแน่นอน
  - id: RL-3.6
    title: Auto Reply
    severity: medium
    check: |
      ข้อความตอบกลับอัตโนมัติถือเป็นข้อความโฆษณา ต้องได้รับการตรวจสอบก่อนใช้งาน ข้อมูลต้องถูกต้อง เป็นปัจจุบัน และไม่สื่อถึงการรับประกันผล
  - id: RL-3.7
    title: Rich Menu
    severity: medium
    check: |
      Rich Menu, Banner, Carousel Card หรือ Thumbnail ถือเป็นสื่อโฆษณา แม้มีพื้นที่จำกัด หากพื้นที่ไม่เพียงพอ ต้องเชื่อมโยงไปยังหน้าที่มีข้อมูลครบถ้วน
  - id: RL-3.8
    title: Landing Page
    severity: high
    check: |
      หน้าปลายทางของโฆษณาต้องมีข้อมูลที่ครบถ้วน ไม่ขัดแย้งกับข้อความในสื่อโฆษณา และหน้า Page ดังกล่าวต้องไม่ใช่หน้าขอข้อมูลส่วนบุคคลทันที ต้องให้ข้อมูลผลิตภัณฑ์เพื่อให้ลูกค้าศึกษาก่อน
    must_state: |
      หน้าปลายทางต้องมีคำเตือน อัตราดอกเบี้ย และรายละเอียดผลิตภัณฑ์อย่างครบถ้วน
  - id: RL-3.9
    title: Website
    severity: medium
    check: |
      เว็บไซต์บริษัทต้องแสดงข้อมูลผลิตภัณฑ์ที่ถูกต้อง เป็นปัจจุบัน และตรวจสอบได้
    must_state: |
      ต้องมีคำเตือน อัตราดอกเบี้ย และรายละเอียดผลิตภัณฑ์อย่างครบถ้วน
  - id: RL-3.10
    title: ป้ายสาขา
    severity: medium
    check: |
      ป้ายประชาสัมพันธ์ภายในและภายนอกสาขาถือเป็นสื่อโฆษณา ให้ดำเนินการตามแนวทางการจัดทำสื่อที่เกี่ยวข้อง
    must_state: |
      ต้องมีคำเตือน อัตราดอกเบี้ย อย่างครบถ้วน และปฏิบัติตามหลักเกณฑ์การจัดทำสื่อโฆษณาเช่นเดียวกัน
  - id: RL-3.11
    title: รถประชาสัมพันธ์
    severity: medium
    check: |
      ข้อความบนรถประชาสัมพันธ์ รถบริการ หรือรถกิจกรรมทางการตลาด ถือเป็นสื่อโฆษณา ให้ดำเนินการตามแนวทางการจัดทำสื่อที่เกี่ยวข้อง
    must_state: |
      ต้องมีคำเตือน อัตราดอกเบี้ย อย่างครบถ้วน และปฏิบัติตามหลักเกณฑ์การจัดทำสื่อโฆษณาเช่นเดียวกัน
  - id: RL-3.12
    title: สื่อภาคสนาม
    severity: medium
    check: |
      Roll Up, Booth, Backdrop, ป้ายกิจกรรม และสื่อประชาสัมพันธ์ภาคสนาม ต้องอยู่ภายใต้หลักเกณฑ์เดียวกับสื่อโฆษณาทั่วไป ให้ดำเนินการตามแนวทางการจัดทำสื่อที่เกี่ยวข้อง
    must_state: |
      ต้องมีคำเตือน อัตราดอกเบี้ย อย่างครบถ้วน และปฏิบัติตามหลักเกณฑ์การจัดทำสื่อโฆษณาเช่นเดียวกัน
