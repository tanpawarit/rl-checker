# generated from 'A. Ads Checklist' > หมวด 1 การออกแบบและจัดทำสื่อโฆษณา — verbatim, DO NOT EDIT BY HAND
category: design
rules:
  - id: RL-1.1
    title: หลักการออกแบบภาพโฆษณา
    severity: high
    check: |
      ภาพประกอบต้องสื่อสารข้อมูลอย่างถูกต้อง เป็นธรรม และไม่ก่อให้เกิดความเข้าใจผิดเกี่ยวกับผลิตภัณฑ์สินเชื่อ เงื่อนไขการอนุมัติ วงเงินสินเชื่อ ภาระหนี้ สิทธิประโยชน์ โดยต้องไม่สร้างความคาดหวังเกินสมควร ไม่สื่อว่าการได้รับสินเชื่อเป็นเรื่องง่าย และไม่ใช้ภาพหรือสัญลักษณ์ที่ละเมิดลิขสิทธิ์
  - id: RL-1.2
    title: ภาพ
    severity: high
    check: |
      ภาพต้องสอดคล้องกับข้อความหลักของสื่อโฆษณาและข้อมูลผลิตภัณฑ์ ต้องแสดงเงื่อนไขสำคัญครบถ้วนในสื่อโฆษณาชิ้นเดียว เช่น อัตราดอกเบี้ยพิเศษ ระยะเวลาโปรโมชั่น และเงื่อนไขการเข้าร่วมรายการส่งเสริมการขาย
      - เงื่อนไขอื่น สามารถระบุให้ลูกค้าศึกษารายละเอียดเพิ่มเติมจากช่องทางอื่นได้ เช่น เว็บไซต์ เบอร์โทรศัพท์ติดต่อเพื่อขอข้อมูลเพิ่มเติม
      - การโฆษณาในสื่อที่มีขนาดเล็กมาก (Thumbnail) ซึ่งไม่สามารถจัดทําข้อมูลให้ชัดเจนครบถ้วนในสื่อโฆษณาชิ้นเดียวกัน เช่น อาจมองเห็นตัวอักษรไม่ชัดเจน สามารถแสดงข้อมูลตามที่หลักเกณฑ์กําหนดในเว็บไซต์หรือช่องทางอื่นของบริษัทที่เชื่อมโยงจากสื่อขนาดเล็กดังกล่าว โดยต้องแสดงข้อมูลตามที่หลักเกณฑ์กําหนดในหน้าถัดไปของเว็บไซต์เมื่อคลิกรูปภาพขนาดเล็ก เช่น Rich Menu Line OA, Trumbnail
  - id: RL-1.3
    title: ข้อความ
    severity: critical
    check: |
      - ข้อมูลสำคัญต้องมองเห็น อ่านได้ และไม่ถูกซ่อนหรือทำให้เข้าใจผิด ตัวอักษรต้องไม่เล็กหรือถูกบีบอัดจนอ่านยาก  
      - สีตัวอักษรไม่กลืนกับพื้นหลัง ต้องตัดกับพื้นหลังอย่างชัดเจน เพื่อให้มองเห็นได้ชัดเจน 
      - ต้องไม่ใช้ข้อความที่ทำให้เข้าใจว่าบริษัทไม่คำนึงถึงความสามารถในการชำระหนี้ของลูกค้า และไม่มีลักษณะกระตุ้นให้ก่อหนี้เกินตัว
    must_state: |
      หลีกเลี่ยงข้อความในลักษณะดังนี้
      - ทำให้เข้าใจว่าการให้สินเชื่อไม่ได้คำนึงถึงความสามารถในการชำระหนี้หรือประวัติการชำระหนี้ของลูกค้า 
      - ทำให้เข้าใจว่ากระบวนการอนุมัติสินเชื่อไม่ได้ทำอย่างรอบคอบ เช่น ใครๆ ก็กู้ได้, กู้เงินเรื่องง่ายๆ, กู้ง่าย, อนุมัติง่าย, แค่ถือเล่มทะเบียนมา ก็ได้เงินก้อนกลับบ้าน, แค่มีรถ ก็กู้ได้, รับเงินสดได้ทันที ผ่านชัวร์ รับเงินทันที
      
      และคำอื่นๆ ดูข้อความ DO/DON'T ได้ที่ Sheet Advertising Dictionary
  - id: RL-1.4
    title: ธนบัตร เงินเหรียญ
    severity: high
    check: |
      ต้องขออนุญาตใช้ต่อ ธปท. ตามกระบวนการที่กำหนด และต้องไม่มีลักษณะดังนี้
      ไม่แสดงภาพพระบรมฉายาลักษณ์บนธนบัตร/เหรียญ
      ไม่ใช้เงินปึกก้อนใหญ่ เกินว่าวงเงินที่บริษัทกำหนดของแต่ละ campaign
      กองเงิน
      รูปเงินทั้งธนบัตรและเหรียญ (รวมถึงรูปธนบัตร/เหรียญที่เป็นสัญลักษณ์) ปลิวว่อน ปลิวลอย พุ่ง
      รูปที่มีลักษณะเป็นการฟุ่มเฟื่อย เช่น รูปของแบรนด์เนม
  - id: RL-1.5
    title: Emoji / Sticker / Graphic Symbol
    severity: high
    check: |
      ต้องไม่สื่อถึงการได้รับอนุมัติสินเชื่อ การได้รับเงิน หรือผลลัพธ์เกินจริง
      ห้ามใช้สัญลักษณ์ที่สื่อว่า ผ่านชัวร์ อนุมัติ 100% หรือได้เงินแน่นอน เงินบิน และ Emoji ที่ต้องมีความสอดคล้องกับโฆษณา 
      
      ตัวอย่าง Emoji ที่ห้ามใช้ร่วมกับข้อความโฆษณา
      ✅100% 💸💸💸 🎉ผ่านชัวร์ 🔥ได้เงินแน่นอน
  - id: RL-1.6
    title: Hashtag
    severity: high
    check: |
      Hashtag ถือเป็นข้อความโฆษณาและต้องอยู่ภายใต้หลักเกณฑ์เดียวกับข้อความโฆษณา
      ต้องไม่ใช้ Hashtag ที่สื่อถึงการอนุมัติแน่นอน หรือไม่ต้องผ่านการพิจารณาสินเชื่อ หรือ ไม่ใช้ Hashtag ที่ไม่เกี่ยวข้อง หรือ Hashtag ที่เป็นคำห้ามใช้ เช่น ของมันต้องมี อยากได้ต้องได้ ซื้อก่อนผ่อนทีหลัง
  - id: RL-1.7
    title: AI Generated Content
    severity: high
    check: |
      สามารถใช้ AI เพื่อสร้างภาพหรือสื่อประกอบได้ แต่ต้องไม่ก่อให้เกิดความเข้าใจผิดเกี่ยวกับลูกค้า พนักงาน สาขา ผลการอนุมัติ หรือสิทธิประโยชน์ของผลิตภัณฑ์
      ห้ามใช้ AI สร้างรีวิวปลอม ลูกค้าปลอม เอกสารปลอม หรือผลอนุมัติปลอม
      และต้องตรวจสอบว่าไม่ขัดต่อหลักเกณฑ์/ข้อห้ามต่างๆ ข้างต้น
