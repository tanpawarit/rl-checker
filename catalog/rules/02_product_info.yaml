# generated from 'A. Ads Checklist' > หมวด 2 ข้อมูลผลิตภัณฑ์สินเชื่อ — verbatim, DO NOT EDIT BY HAND
category: product_info
rules:
  - id: RL-2.1
    title: คำเตือน และอัตราดอกเบี้ย
    severity: critical
    required_text_ref: [warn.combined, warn.crl, warn.c2c]
    check: |
      - ต้องแสดงคำเตือน “กู้เท่าที่จำเป็นและชำระคืนไหว” ในสื่อโฆษณา
      ทุกประเภท 
      - กล่าวถึงสินเชื่อประเภทใดบ้างในสื่อ ต้องใส่ข้อความคำเตือนให้ครบทุกผลิตภัณฑ์
      - ใส่คำเตือนครบทุกจุด ทุกรูป และคลิปโพสต์ และหากเป็นช่องทางที่มี Caption ต้องใส่คำเตือนใน Caption ด้วย
      - แสดงคำเตือนเพื่อกระตุกพฤติกรรมให้มีการก่อหนี้อย่างเหมาะสม ต้องเห็น "คำเตือน" อย่างชัดเจน ทั้งขนาดตัวอักษรไม่เล็กเกินไป สีตัวอักษรตัดกับพื้นหลัง
      - แสดงอัตราดอกเบี้ยที่แท้จริงต่อปี (effective interest rate) เป็นช่วงระหว่างอัตราดอกเบี้ยตํ่าสุด และอัตราดอกเบี้ยสูงสุดของแต่ละผลิตภัณฑ์ให้ชัดเจน
      **การทำสื่อโฆษณาชิ้นเดียว แต่มีหลายผลิตภัณฑ์ให้แสดงช่วงระหว่างอัตราดอกเบี้ยตํ่าสุดและอัตราดอกเบี้ยสูงสุดของแต่ละผลิตภัณฑ์ให้ชัดเจน โดยเฉพาะในกรณีที่อัตราดอกเบี้ยของแต่ละผลิตภัณฑ์สินเชื่อมีอัตราดอกเบี้ยที่แตกต่างกันมาก
    must_state: |
      แสดงอัตราดอกเบี้ยมาตรฐาน (รวมทุกผลิตภัณฑ์)
      "กู้เท่าที่จำเป็นและชำระคืนไหว อัตราดอกเบี้ยที่แท้จริงต่อปี สินเชื่อจำนำเล่มทะเบียนรถ แบ่งเป็นกรณีบุคคลธรรมดา 12.82% - 24.00% และกรณีนิติบุคคล 9.50% - 15.00% และ สินเชื่อโอนเล่มทะเบียนรถ แบ่งเป็นกรณีบุคคลธรรมดามีวัตถุประสงค์ใช้รถเพื่อการส่วนตัว 6.08% - 15.00% และกรณีบุคคลธรรมดาหรือนิติบุคคลมีวัตถุประสงค์ใช้รถเพื่อการพาณิชย์ 6.08% - 26.62% "
      
      แสดงอัตราดอกเบี้ยผลิตภัณฑ์สินเชื่อจำนำเล่มทะเบียนรถ 
      "กู้เท่าที่จำเป็นและชำระคืนไหว อัตราดอกเบี้ยที่แท้จริงต่อปี สินเชื่อจำนำเล่มทะเบียนรถ แบ่งเป็นกรณีบุคคลธรรมดา 12.82% - 24.00% และกรณีนิติบุคคล 9.50% - 15.00%"
      กรณีลูกค้าบุคคลธรรมดา
      “กู้เท่าที่จำเป็นและชำระคืนไหว อัตราดอกเบี้ยที่แท้จริงต่อปี สินเชื่อจำนำเล่มทะเบียนรถ 12.82% - 24.00%”
      กรณีลูกค้านิติบุคคล
      "กู้เท่าที่จำเป็นและชำระคืนไหว อัตราดอกเบี้ยที่แท้จริงต่อปี สินเชื่อจำนำเล่มทะเบียนรถ นิติบุคคล 9.50% - 15.00%"
      
      แสดงอัตราดอกเบี้ยผลิตภัณฑ์สินเชื่อโอนเล่มทะเบียนรถ 
      “กู้เท่าที่จำเป็นและชำระคืนไหว อัตราดอกเบี้ยที่แท้จริงต่อปี สินเชื่อโอนเล่มทะเบียนรถ แบ่งเป็น กรณีบุคคลธรรมดามีวัตถุประสงค์ใช้รถเพื่อการส่วนตัว 6.08% - 15.00% และ กรณีบุคคลธรรมดาหรือนิติบุคคลมีวัตถุประสงค์ใช้รถเพื่อการพาณิชย์ 6.08% - 26.62%”
  - id: RL-2.2
    title: การโฆษณาด้วยข้อมูลยอดผ่อนชำระ เช่น ยอดผ่อนต่อวัน XX บาท
    severity: high
    check: |
      ต้องแสดงสมมติฐานการคำนวณให้ครบถ้วน เพื่อให้ลูกค้าเข้าใจภาระหนี้ที่แท้จริง วงเงินสินเชื่อ อัตราดอกเบี้ย จำนวนดอกเบี้ยรวม ค่างวด จำนวนงวด และเงื่อนไขการคำนวณ
    must_state: |
      สมมุติฐานการคำนวณสินเชื่อโอนเล่มทะเบียนรถ
      เงื่อนไขเป็นไปตามที่บริษัทกำหนด *สมมติฐานการคำนวณมาจากการกู้สินเชื่อประเภทโอนเล่มทะเบียน ผ่อนชำระเป็นงวด ที่ได้รับอนุมัติวงเงินสินเชื่อ xxxx บาท แบ่งเป็นกรณีบุคคลธรรมดามีวัตถุประสงค์ใช้รถเพื่อการส่วนตัว อัตราดอกเบี้ยที่แท้จริงตลอดอายุสัญญา xx % ต่อปี จำนวนดอกเบี้ยที่ต้องชำระตลอดอายุสัญญา xxxxx บาท ค่างวด xxx บาทต่อเดือน ผ่อนเป็นระยะเวลา xx งวด และกรณีบุคคลธรรมดาหรือนิติบุคคลมีวัตถุประสงค์ใช้รถเพื่อการพาณิชย์ อัตราดอกเบี้ยที่แท้จริงตลอดอายุสัญญา xx % ต่อปี จำนวนดอกเบี้ยที่ต้องชำระตลอดอายุสัญญา xxxxx บาท ค่างวด xxx บาทต่อเดือน ผ่อนเป็นระยะเวลา xx งวด ศึกษารายละเอียดเพิ่มเติมได้จากเว็บไซต์ เงินให้ใจ www.ngernhaijai.com
      
      สมมุติฐานการคำนวณสินเชื่อจำนำเล่มทะเบียนรถ
      เงื่อนไขเป็นไปตามที่บริษัทกำหนด *สมมติฐานการคำนวณมาจากการกู้สินเชื่อประเภทจำนำเล่มทะเบียน ผ่อนชำระเป็นงวด ที่ได้รับอนุมัติวงเงินสินเชื่อ xxxxx บาท อัตราดอกเบี้ยที่แท้จริงตลอดอายุสัญญา xx % ต่อปี จำนวนดอกเบี้ยที่ต้องชำระตลอดอายุสัญญา xxxxx บาท ค่างวด xxx บาทต่อเดือน ผ่อนเป็นระยะเวลา xx งวด ศึกษารายละเอียดเพิ่มเติมได้จากเว็บไซต์ เงินให้ใจ www.ngernhaijai.com
  - id: RL-2.3
    title: การโฆษณาด้วยข้อมูลอัตราดอกเบี้ย เช่น ดอกเบี้ย xx บาทต่อวัน/ต่อเดือน
    severity: high
    check: |
      ต้องแสดงอัตราดอกเบี้ยที่แท้จริงต่อปี (effective interest rate) ของ
      ผลิตภัณฑ์สินเชื่อเป็นช่วงระหว่างอัตราดอกเบี้ยต่ำสุด และอัตราดอกเบี้ยสูงสุด  ต้องแสดงเงื่อนไขที่สําคัญของผลิตภัณฑ์สินเชื่อที่เกี่ยวข้องกับอัตราดอกเบี้ยที่จูงใจ อย่างครบถ้วนและชัดเจนในสื่อโฆษณาชิ้นเดียวกัน, แสดงเงื่อนไขที่ลูกค้าจะได้รับอัตราดอกเบี้ยพิเศษ การแสดงระยะเวลาที่จะได้รับยกเว้นค่าธรรมเนียม, กรณีเงื่อนไขอื่น บริษัทสามารถระบุให้ลูกค้าศึกษารายละเอียดเพิ่มเติมจากช่องทางอื่นได้ เช่น เว็บไซต์ของบริษัท เบอร์โทรศัพท์ติดต่อเพื่อขอข้อมูลเพิ่มเติม
    must_state: |
      เงื่อนไขการได้รับอัตราดอกเบี้ย ระยะเวลาโปรโมชั่น และช่องทางศึกษารายละเอียดเพิ่มเติม
      
      สมมุติฐานการคำนวณสินเชื่อโอนเล่มทะเบียนรถ
      เงื่อนไขเป็นไปตามที่บริษัทกำหนด *สมมติฐานการคำนวณมาจากการกู้สินเชื่อประเภทโอนเล่มทะเบียน ผ่อนชำระเป็นงวด ที่ได้รับอนุมัติวงเงินสินเชื่อ xxxx บาท แบ่งเป็นกรณีบุคคลธรรมดามีวัตถุประสงค์ใช้รถเพื่อการส่วนตัว อัตราดอกเบี้ยที่แท้จริงตลอดอายุสัญญา xx % ต่อปี จำนวนดอกเบี้ยที่ต้องชำระตลอดอายุสัญญา xxxxx บาท ค่างวด xxx บาทต่อเดือน ผ่อนเป็นระยะเวลา xx งวด และกรณีบุคคลธรรมดาหรือนิติบุคคลมีวัตถุประสงค์ใช้รถเพื่อการพาณิชย์ อัตราดอกเบี้ยที่แท้จริงตลอดอายุสัญญา xx % ต่อปี จำนวนดอกเบี้ยที่ต้องชำระตลอดอายุสัญญา xxxxx บาท ค่างวด xxx บาทต่อเดือน ผ่อนเป็นระยะเวลา xx งวด ศึกษารายละเอียดเพิ่มเติมได้จากเว็บไซต์ เงินให้ใจ www.ngernhaijai.com
      
