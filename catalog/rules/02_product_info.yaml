      เงื่อนไขเป็นไปตามที่บริษัทกำหนด *สมมติฐานการคำนวณมาจากการกู้สินเชื่อประเภทจำนำเล่มทะเบียน ผ่อนชำระเป็นงวด ที่ได้รับอนุมัติวงเงินสินเชื่อ xxxxx บาท อัตราดอกเบี้ยที่แท้จริงตลอดอายุสัญญา xx % ต่อปี จำนวนดอกเบี้ยที่ต้องชำระตลอดอายุสัญญา xxxxx บาท ค่างวด xxx บาทต่อเดือน ผ่อนเป็นระยะเวลา xx งวด ศึกษารายละเอียดเพิ่มเติมได้จากเว็บไซต์ เงินให้ใจ www.ngernhaijai.com
  - id: RL-2.4
    title: การโฆษณาด้วยวงเงินสินเชื่อ
    severity: high
    check: |
      ห้ามทำให้เข้าใจว่าลูกค้าทุกรายจะได้รับวงเงินสูงสุดที่โฆษณา
    must_state: |
      ระบุว่าวงเงินอนุมัติขึ้นอยู่กับผลการพิจารณาและหลักเกณฑ์ของบริษัท
  - id: RL-2.5
    title: การสื่อสารเรื่องการรับเงิน
    severity: medium
    check: |
      สามารถสื่อสารเรื่องความรวดเร็วในการรับเงินได้ หากเป็นข้อเท็จจริงและไม่รับประกันผล
    must_state: |
      ระบุเงื่อนไข เช่น เอกสารครบถ้วนและผ่านการอนุมัติ จะได้รับเงินภายใน xxx วัน หลังจากได้รับแจ้งผลอนุมัติ
  - id: RL-2.6
    title: การสื่อสารเรื่องโอนเล่มทะเบียนรถ
    severity: medium
    check: |
      ต้องสื่อสารให้ชัดเจนเกี่ยวกับลักษณะผลิตภัณฑ์และสิทธิหน้าที่ที่เกิดขึ้นจากการโอนเล่มทะเบียน อธิบายรายละเอียดผลิตภัณฑ์ตามข้อเท็จจริง
  - id: RL-2.7
    title: การสื่อสารเรื่องมูลค่าหลักประกัน
    severity: high
    check: |
      ห้ามทำให้เข้าใจว่ามูลค่ารถทุกคันจะได้รับวงเงินเท่ากัน
    must_state: |
      ระบุว่าการประเมินขึ้นอยู่กับสภาพรถและหลักเกณฑ์ของบริษัท เช่น วงเงินสูงสุด 1.5 เท่า ตามราคาประเมินรถ กรณีสื่อเผลิตภัณฑ์จำนำเล่มทะเบียน หรือการสื่อสารรวมๆ ไม่ระบุผลิตภัณฑ์ ต้องใส่ * ท้ายคำโฆษณา และต้องระบุเงื่อนไขเพิ่มเติมในสื่อชิ้นเดียวกัน (เงื่อนไขต้องสอดคล้องกัน)
  - id: RL-2.8
    title: การสื่อสารเรื่องผลการอนุมัติสินเชื่อ
    severity: critical
    check: |
      ห้ามรับประกันผลการอนุมัติสินเชื่อ
      ทั้งนี้ ให้ระมัดระวังเรื่องการใช้ประโยค "วงเงินตามที่คุย*" ต้องใส่ *หมายเหตุและเงื่อนไขให้ชัดเจน เพื่อไม่เป็นการรับประกันผล
    must_state: |
      ระบุว่า วงเงินดังกล่าวเป็นไปตามข้อมูลที่ได้รับในเบื้องต้น การพิจารณาอนุมัติเป็นไปตามหลักเกณฑ์และเงื่อนไขของบริษัท ศึกษารายละเอียดเพิ่มเติมได้จากเว็บไซต์ เงินให้ใจ www.ngernhaijai.com
